<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ヒュースの七夕2026</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: sans-serif;
    background: linear-gradient(#e0ffe0, #a0d0a0);
  }

  #form {
    position: absolute;
    left: 50%;
    top: 20px;
    transform: translateX(-50%);
    z-index: 10;
    background: rgba(255,255,255,0.9);
    padding: 10px 15px;
    border-radius: 8px;
    width: calc(100% - 40px);
    max-width: 350px;
    backdrop-filter: blur(4px);
  }

  #form input, #form select {
    width: 100%;
    margin-bottom: 8px;
    padding: 6px;
    font-size: 14px;
  }

  #form button {
    width: 100%;
    padding: 8px;
    font-size: 16px;
    background: #4caf50;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }

  #area {
    position: relative;
    width: 100%;
    height: 100%;
  }

  .tanzaku {
    position: absolute;
    width: 80px;
    height: 180px;
    padding: 10px;
    border-radius: 4px;
    animation: sway 3s ease-in-out infinite alternate;
    font-size: 16px;
    writing-mode: vertical-rl;
    text-orientation: upright;
    word-break: break-word;
    cursor: pointer;
    font-family: 'Kaisei Decol', serif;
    transition:transform0.2s;
  }

  @keyframes sway {
    from { transform: rotate(-3deg); }
    to   { transform: rotate(3deg); }
  }
</style>
</head>
<body>

<div id="form">
  <input id="wish" type="text" placeholder="願いごと">
  <input id="name" type="text" placeholder="名前（匿名なら空欄）">

  <select id="color">
    <option value="#ffeb3b">黄色</option>
    <option value="#ff8a80">赤</option>
    <option value="#80d8ff">青</option>
    <option value="#b388ff">紫</option>
    <option value="#a5d6a7">緑</option>
  </select>

  <button id="submit-btn">吊るす</button>
</div>

<div id="area"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, query, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  // ★サークル用の簡易パスワード制限
  // 好きな合言葉に変更してください（例: サークル名など）
  const SECRET_PASSWORD = "ヒュース"; 

  const inputPass = prompt("サークルの合言葉を入力してください：");
  if (inputPass !== SECRET_PASSWORD) {
    alert("合言葉が違います。アクセスできません。");
    document.body.innerHTML = "<h1 style='text-align:center; margin-top:20vh;'>閲覧権限がありません。</h1>";
    throw new Error("Password incorrect"); // 処理を強制ストップ
  }

  // いただいたFirebaseの設定
  const firebaseConfig = {
    apiKey: "AIzaSyA__WisNkn73VqoQBBOFY_DAZMW2iO068Q",
    authDomain: "tanabata-circle.firebaseapp.com",
    projectId: "tanabata-circle",
    storageBucket: "tanabata-circle.firebasestorage.app",
    messagingSenderId: "568933765302",
    appId: "1:568933765302:web:318c4b1250869a9c429617"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const tanzakuCollection = collection(db, "wishes");

  // 1. データベースからリアルタイムに短冊を取得して画面に表示する処理
  onSnapshot(tanzakuCollection, (snapshot) => {
    const area = document.getElementById("area");
    area.innerHTML = ""; // 一旦画面をクリアして再描画

    snapshot.forEach((docSnap) => {
      const t = docSnap.data();
      const docId = docSnap.id; // 削除するときに使うID

      const div = document.createElement("div");
      div.className = "tanzaku";
      div.style.background = t.color;
      div.style.left = t.x + "px";
      div.style.top = t.y + "px";
      div.innerHTML = `${t.wish}<br>— ${t.name}`;

     // ★ここを追加：クリックしたら一番手前に来るようにする
      div.addEventListener('mouseenter', () => {
        div.style.zIndex = "999";
        div.style.transform = "scale(1.05) rotate(0deg)"; // 少し大きくして真っ直ぐに
      });
      div.addEventListener('mouseleave', () => {
        div.style.zIndex = "auto";
        div.style.transform = ""; // 元に戻す
      });

      // 短冊をクリックしたときの削除処理
      div.onclick = async () => {
        if (confirm("この短冊をみんなの画面からも削除しますか？")) {
          await deleteDoc(doc(db, "wishes", docId));
        }
      };

      area.appendChild(div);
    });
  });

  // 2. 短冊を新しく追加（Firebaseへ送信）する処理
  document.getElementById("submit-btn").onclick = async () => {
    const wish = document.getElementById("wish").value;
    const name = document.getElementById("name").value || "匿名";
    const color = document.getElementById("color").value;

    if (!wish.trim()) {
      alert("願いごとを入力してください");
      return;
    }

    const tanzaku = {
      wish,
      name,
      color,
      x: Math.random() * (window.innerWidth - 100),
      y: 150+Math.random() * (window.innerHeight - 350)
    };

    try {
      // Firebaseにデータを送信（コレクションが自動で作られます）
      await addDoc(tanzakuCollection, tanzaku);
      
      // 入力欄をクリア
      document.getElementById("wish").value = "";
      document.getElementById("name").value = "";
    } catch (error) {
      console.error("エラーが発生しました:", error);
      alert("送信に失敗しました。テストモードの期限が切れていないか確認してください。");
    }
  };
</script>

</body>
</html>
